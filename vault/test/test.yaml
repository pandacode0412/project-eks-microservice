apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-agent-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-agent-demo
  template:
    metadata:
      labels:
        app: vault-agent-demo
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "vault-demo-role"
        vault.hashicorp.com/agent-inject-secret-mysecret: "kv/mysecret"
    spec:
      serviceAccountName: vault-demo-sa
      containers:
        - name: app
          image: nginx
      #     volumeMounts:
      #       - name: vault-secret
      #         mountPath: /vault/secrets
      #         readOnly: true
      # volumes:
      #   - name: vault-secret
      #     emptyDir: {}
