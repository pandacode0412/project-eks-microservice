apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: stateful-gateway
spec:
  # Selector to determine which Istio Ingress Gateway to use
  # This should match the labels on your Istio Ingress Gateway deployment
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "test.onefirefly.click" # Frontend application
        - "api.onefirefly.click" # API Gateway and microservices
